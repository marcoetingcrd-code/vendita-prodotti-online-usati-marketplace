{% extends "base.html" %}
{% block title %}Nuovo Prodotto — AI Assistant{% endblock %}

{% block content %}
<div x-data="aiChat()" x-init="init()" class="flex flex-col" style="height: calc(100vh - 72px); margin: -24px;">

    <!-- Chat Messages Area -->
    <div class="flex-1 overflow-y-auto px-6 py-6" x-ref="chatArea">
        <div class="max-w-3xl mx-auto space-y-4">
            <template x-for="(msg, i) in messages" :key="i">
                <div>
                    <!-- AI Message -->
                    <template x-if="msg.role === 'ai'">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0 text-white text-sm font-bold">AI</div>
                            <div class="flex-1 min-w-0">
                                <div class="bg-white rounded-2xl rounded-tl-md border border-gray-200 px-5 py-4 shadow-sm">
                                    <div x-html="msg.html || ''"></div>
                                </div>
                                <p class="text-[10px] text-gray-400 mt-1 ml-1" x-text="msg.time"></p>
                            </div>
                        </div>
                    </template>
                    <!-- User Message -->
                    <template x-if="msg.role === 'user'">
                        <div class="flex items-start gap-3 justify-end">
                            <div class="flex-1 min-w-0 flex flex-col items-end">
                                <div class="bg-indigo-600 text-white rounded-2xl rounded-tr-md px-5 py-3 shadow-sm max-w-[80%]">
                                    <p class="text-sm" style="white-space:pre-wrap;" x-text="msg.text"></p>
                                    <div x-show="msg.photoCount" class="flex items-center gap-1 mt-2 text-indigo-200 text-xs">
                                        <span>📸</span> <span x-text="msg.photoCount + ' foto allegate'"></span>
                                    </div>
                                </div>
                                <p class="text-[10px] text-gray-400 mt-1 mr-1" x-text="msg.time"></p>
                            </div>
                            <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center flex-shrink-0 text-white text-sm font-bold">Tu</div>
                        </div>
                    </template>
                    <!-- AI Result Card -->
                    <template x-if="msg.role === 'result'">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0 text-white text-sm font-bold">AI</div>
                            <div class="flex-1 min-w-0">
                                <div class="bg-white rounded-2xl rounded-tl-md border border-gray-200 shadow-sm overflow-hidden">
                                    <!-- Photos Preview -->
                                    <div class="p-4 border-b border-gray-100">
                                        <div class="flex items-center justify-between mb-3">
                                            <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Foto prodotto</p>
                                            <button x-show="draft.processed_path" @click="showRefineInput = !showRefineInput"
                                                    class="text-xs font-semibold text-indigo-600 hover:text-indigo-800">
                                                🎨 Modifica foto AI
                                            </button>
                                        </div>
                                        <div class="flex gap-3 overflow-x-auto pb-2">
                                            <template x-for="(img, j) in draft.images" :key="j">
                                                <div class="flex-shrink-0 w-24 h-24 rounded-xl overflow-hidden bg-gray-100 relative cursor-pointer hover:ring-2 hover:ring-indigo-400 transition"
                                                     @click="openLightbox('/' + img.path)">
                                                    <img :src="'/' + img.path" class="w-full h-full object-cover">
                                                    <div class="absolute bottom-0 left-0 right-0 bg-gray-800/70 text-white text-[9px] text-center py-0.5">Originale</div>
                                                </div>
                                            </template>
                                            <template x-if="draft.processed_path">
                                                <div class="flex-shrink-0 w-32 h-32 rounded-xl overflow-hidden bg-[#f0f0f0] relative border-2 border-emerald-500 cursor-pointer hover:ring-2 hover:ring-emerald-400 transition shadow-lg"
                                                     @click="openLightbox('/' + draft.processed_path)">
                                                    <img :src="'/' + draft.processed_path" class="w-full h-full object-contain">
                                                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-r from-emerald-600 to-teal-600 text-white text-[9px] text-center py-0.5 font-bold">✨ Generata AI</div>
                                                </div>
                                            </template>
                                        </div>
                                        <p x-show="!draft.processed_path" class="text-[10px] text-amber-600 mt-1">⏳ Immagine AI non generata — verrà usata la foto originale</p>

                                        <!-- Refine Image Input -->
                                        <div x-show="showRefineInput" x-cloak class="mt-3 border border-indigo-200 bg-indigo-50/50 rounded-xl p-3">
                                            <p class="text-[10px] text-gray-500 mb-2">Chiedi modifiche all'AI (es: "togli lo sfondo", "aggiungi le gambe", "rimuovi il testo", "mostra il prodotto assemblato")</p>
                                            <div class="flex gap-2">
                                                <input type="text" x-model="refineRequest" placeholder="Es: rimuovi il testo e mostra il prodotto completo..."
                                                       class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none"
                                                       @keydown.enter.prevent="refineImage()">
                                                <button @click="refineImage()" :disabled="refining || !refineRequest.trim()"
                                                        class="px-4 py-2 text-xs font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-40">
                                                    <span x-show="!refining">🎨 Applica</span>
                                                    <span x-show="refining">⏳...</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Analysis -->
                                    <div class="p-4 border-b border-gray-100">
                                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Analisi AI</p>
                                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                            <div>
                                                <p class="text-[10px] text-gray-400">Oggetto</p>
                                                <input type="text" x-model="draft.title" class="w-full text-sm font-semibold text-gray-900 border-b border-transparent hover:border-gray-300 focus:border-indigo-500 outline-none py-0.5 bg-transparent">
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-gray-400">Categoria</p>
                                                <input type="text" x-model="draft.category" class="w-full text-sm text-gray-900 border-b border-transparent hover:border-gray-300 focus:border-indigo-500 outline-none py-0.5 bg-transparent">
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-gray-400">Condizione</p>
                                                <input type="text" x-model="draft.condition" class="w-full text-sm text-gray-900 border-b border-transparent hover:border-gray-300 focus:border-indigo-500 outline-none py-0.5 bg-transparent">
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-gray-400">Prezzo suggerito</p>
                                                <div class="flex items-center">
                                                    <span class="text-sm text-gray-500">€</span>
                                                    <input type="number" x-model.number="draft.price" class="w-full text-sm font-bold text-green-600 border-b border-transparent hover:border-gray-300 focus:border-indigo-500 outline-none py-0.5 bg-transparent ml-1">
                                                </div>
                                                <p x-show="draft.price_range_min || draft.price_range_max" class="text-[10px] text-gray-400 mt-0.5">
                                                    Range: €<span x-text="draft.price_range_min"></span> — €<span x-text="draft.price_range_max"></span>
                                                </p>
                                            </div>
                                        </div>
                                        <div x-show="draft.brand || draft.color" class="flex items-center gap-3 mt-2 text-xs text-gray-500">
                                            <span x-show="draft.brand">🏷️ <span x-text="draft.brand"></span></span>
                                            <span x-show="draft.color">🎨 <span x-text="draft.color"></span></span>
                                        </div>
                                    </div>

                                    <!-- Descriptions Tabs -->
                                    <div class="p-4">
                                        <div class="flex items-center justify-between mb-3">
                                            <p class="text-xs font-bold text-gray-500 uppercase tracking-wider">Descrizioni per piattaforma</p>
                                            <button @click="regenerateDescriptions()" :disabled="regenerating" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 disabled:opacity-50">
                                                <span x-show="!regenerating">🔄 Rigenera tutte</span>
                                                <span x-show="regenerating">⏳ Rigenerando...</span>
                                            </button>
                                        </div>
                                        <!-- Platform Tabs -->
                                        <div class="flex gap-1 mb-3 overflow-x-auto pb-1">
                                            <template x-for="p in ['subito','ebay','vinted','facebook','vestiaire']" :key="p">
                                                <button @click="activeTab = p" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap transition"
                                                        :class="activeTab === p ? 'bg-indigo-100 text-indigo-700 ring-1 ring-indigo-300' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'">
                                                    <span x-html="platformLogo(p, 16)"></span>
                                                    <span class="capitalize" x-text="p"></span>
                                                </button>
                                            </template>
                                        </div>
                                        <!-- Tab Content -->
                                        <template x-for="p in ['subito','ebay','vinted','facebook','vestiaire']" :key="'tab-'+p">
                                            <div x-show="activeTab === p" class="space-y-2">
                                                <div>
                                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Titolo</label>
                                                    <input type="text" x-model="draft.descriptions[p].title"
                                                           class="w-full text-sm font-semibold text-gray-900 border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                                </div>
                                                <div>
                                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Descrizione</label>
                                                    <textarea x-model="draft.descriptions[p].description" rows="5"
                                                              class="w-full text-sm text-gray-800 border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-y"></textarea>
                                                </div>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- Owner + Create -->
                                    <div class="p-4 bg-gray-50 border-t border-gray-100">
                                        <div class="flex items-center gap-4">
                                            <div class="flex-1">
                                                <label class="text-[10px] font-bold text-gray-400 uppercase">Proprietario</label>
                                                <select x-model="draft.owner_id" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
                                                    {% for owner in owners %}
                                                    <option value="{{ owner.id }}">{{ owner.name }}</option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <div class="flex gap-2 pt-4">
                                                <button @click="createProduct()" :disabled="creating"
                                                        class="px-6 py-2.5 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 transition disabled:opacity-50 shadow-lg shadow-indigo-200">
                                                    <span x-show="!creating">✅ Crea Prodotto</span>
                                                    <span x-show="creating">⏳ Creazione...</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    <!-- Loading -->
                    <template x-if="msg.role === 'loading'">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0 text-white text-sm font-bold">AI</div>
                            <div class="bg-white rounded-2xl rounded-tl-md border border-gray-200 px-5 py-4 shadow-sm">
                                <div class="flex items-center gap-3">
                                    <div class="flex gap-1">
                                        <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:0s"></span>
                                        <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:0.2s"></span>
                                        <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:0.4s"></span>
                                    </div>
                                    <span class="text-sm text-gray-500" x-text="msg.text || 'Sto analizzando...'"></span>
                                </div>
                                <div x-show="msg.progress" class="mt-3 w-full bg-gray-100 rounded-full h-1.5">
                                    <div class="bg-indigo-500 h-1.5 rounded-full transition-all duration-500" :style="'width:' + (msg.progress||0) + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-white border-t border-gray-200 px-6 py-4">
        <div class="max-w-3xl mx-auto">
            <!-- Photo Previews -->
            <div x-show="files.length > 0" class="flex gap-2 mb-3 overflow-x-auto pb-2">
                <template x-for="(f, i) in previews" :key="i">
                    <div class="relative flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden bg-gray-100 group">
                        <img :src="f.url" class="w-full h-full object-cover">
                        <button @click="removeFile(i)" class="absolute inset-0 bg-black/50 text-white text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition">✕</button>
                    </div>
                </template>
                <div class="flex-shrink-0 w-14 h-14 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400 hover:border-indigo-400 hover:text-indigo-500 cursor-pointer transition"
                     @click="$refs.fileAdd.click()">+</div>
                <input type="file" x-ref="fileAdd" multiple accept="image/*" @change="addFiles($event)" class="hidden">
            </div>

            <!-- Input Row -->
            <div class="flex items-end gap-3">
                <button @click="$refs.fileInput.click()" class="flex-shrink-0 w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 hover:text-gray-700 transition" title="Allega foto">
                    📸
                </button>
                <input type="file" x-ref="fileInput" multiple accept="image/*" @change="addFiles($event)" class="hidden">
                <div class="flex-1 relative">
                    <textarea x-model="userInput" @keydown.enter.prevent="if(!$event.shiftKey) sendMessage()" rows="1"
                              placeholder="Descrivi il prodotto, carica le foto e io faccio il resto..."
                              class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none bg-gray-50 focus:bg-white"
                              style="min-height:44px; max-height:120px;"
                              @input="$el.style.height='44px'; $el.style.height=$el.scrollHeight+'px'"></textarea>
                </div>
                <button @click="sendMessage()" :disabled="processing || (!userInput.trim() && !files.length)"
                        class="flex-shrink-0 w-10 h-10 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white flex items-center justify-center transition disabled:opacity-40 shadow-lg shadow-indigo-200">
                    ➤
                </button>
            </div>
        </div>
    </div>
    <!-- Lightbox -->
    <div x-show="lightboxSrc" x-cloak @click="lightboxSrc = null" @keydown.escape.window="lightboxSrc = null"
         class="fixed inset-0 z-50 bg-black/80 flex items-center justify-center cursor-pointer">
        <img :src="lightboxSrc" class="max-w-[90vw] max-h-[90vh] object-contain rounded-xl shadow-2xl">
        <button class="absolute top-6 right-6 text-white text-3xl hover:text-gray-300">&times;</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function aiChat() {
    return {
        messages: [],
        userInput: '',
        files: [],
        previews: [],
        processing: false,
        creating: false,
        regenerating: false,
        activeTab: 'subito',
        draft: null,
        lightboxSrc: null,
        showRefineInput: false,
        refineRequest: '',
        refining: false,

        init() {
            this.addAiMessage(`<p class="text-base font-semibold text-gray-900 mb-2">Ciao! Sono il tuo assistente AI per la creazione prodotti.</p>
                <p class="text-sm text-gray-600 mb-3">Ecco come funziona:</p>
                <ol class="text-sm text-gray-600 space-y-1 list-decimal list-inside">
                    <li><strong>Carica le foto</strong> del prodotto (anche più foto da angolazioni diverse)</li>
                    <li><strong>Descrivi brevemente</strong> l'oggetto, difetti, materiali...</li>
                    <li><strong>Premi invio</strong> e io: analizzo, genero una foto professionale, e creo le descrizioni per 5 piattaforme</li>
                    <li><strong>Raffina la foto</strong> chiedendomi modifiche ("togli lo sfondo", "mostra assemblato")</li>
                    <li><strong>Modifica</strong> quello che vuoi e crea il prodotto!</li>
                </ol>
                <p class="text-sm text-gray-500 mt-3 italic">Carica anche solo le foto senza scrivere nulla — farò tutto io. Più foto carichi, meglio ricostruisco il prodotto.</p>`);
        },

        addAiMessage(html) {
            this.messages.push({ role: 'ai', html, time: this.now() });
            this.scrollDown();
        },

        addUserMessage(text, photoCount) {
            this.messages.push({ role: 'user', text, photoCount, time: this.now() });
            this.scrollDown();
        },

        addLoading(text, progress) {
            this.messages.push({ role: 'loading', text, progress });
            this.scrollDown();
            return this.messages.length - 1;
        },

        removeLoading(idx) {
            if (idx !== null && this.messages[idx]?.role === 'loading') this.messages.splice(idx, 1);
        },

        addFiles(e) {
            for (const f of e.target.files) {
                if (!f.type.startsWith('image/')) continue;
                this.files.push(f);
                this.previews.push({ url: URL.createObjectURL(f), name: f.name });
            }
            e.target.value = '';
        },

        removeFile(i) {
            URL.revokeObjectURL(this.previews[i].url);
            this.files.splice(i, 1);
            this.previews.splice(i, 1);
        },

        async sendMessage() {
            const text = this.userInput.trim();
            const photoCount = this.files.length;
            if (!text && !photoCount) return;

            // Se il draft esiste e non ci sono nuove foto, tratta come richiesta di raffinamento immagine
            if (this.draft && !photoCount && text) {
                this.refineRequest = text;
                this.userInput = '';
                await this.refineImage();
                return;
            }

            if (!photoCount) {
                this.addAiMessage('<p class="text-sm text-amber-700">⚠️ Carica almeno una foto del prodotto per iniziare l\'analisi.</p>');
                return;
            }

            this.addUserMessage(text || '📸 Foto caricate', photoCount);
            this.userInput = '';
            this.processing = true;

            const loadIdx = this.addLoading('Carico le foto e analizzo con AI...', 20);

            try {
                const fd = new FormData();
                for (const f of this.files) fd.append('files', f);
                fd.append('description', text);
                fd.append('owner_id', '{{ owners[0].id if owners else "" }}');

                // Update progress
                setTimeout(() => { if (this.messages[loadIdx]) this.messages[loadIdx].progress = 30; this.messages[loadIdx].text = 'Analisi Gemini Vision...'; }, 2000);
                setTimeout(() => { if (this.messages[loadIdx]) this.messages[loadIdx].progress = 50; this.messages[loadIdx].text = 'Generazione foto professionale AI...'; }, 6000);
                setTimeout(() => { if (this.messages[loadIdx]) this.messages[loadIdx].progress = 75; this.messages[loadIdx].text = 'Generazione descrizioni 5 piattaforme...'; }, 15000);
                setTimeout(() => { if (this.messages[loadIdx]) this.messages[loadIdx].progress = 90; this.messages[loadIdx].text = 'Quasi pronto...'; }, 25000);

                const res = await fetch('/api/products/ai-draft', { method: 'POST', body: fd });
                if (!res.ok) throw new Error('Errore analisi');
                const data = await res.json();

                this.removeLoading(loadIdx);

                // Build draft
                this.draft = {
                    owner_id: data.owner_id,
                    title: data.descriptions?.title || data.analysis?.object || 'Prodotto',
                    category: data.analysis?.category || 'Altro',
                    condition: data.analysis?.condition || 'buono',
                    price: data.analysis?.suggested_price_eur || null,
                    price_range_min: data.analysis?.price_range_min || null,
                    price_range_max: data.analysis?.price_range_max || null,
                    brand: data.analysis?.brand || null,
                    color: data.analysis?.color || null,
                    defects: data.analysis?.defects || null,
                    dimensions: data.analysis?.dimensions_estimate || null,
                    materials: data.analysis?.materials || null,
                    processed_path: data.processed_path,
                    images: (data.image_paths || []).map(p => ({ path: p })),
                    descriptions: {
                        subito: data.descriptions?.subito || { title: '', description: '' },
                        ebay: data.descriptions?.ebay || { title: '', description: '' },
                        vinted: data.descriptions?.vinted || { title: '', description: '' },
                        facebook: data.descriptions?.facebook || { title: '', description: '' },
                        vestiaire: data.descriptions?.vestiaire || { title: '', description: '' },
                    },
                };

                this.messages.push({ role: 'result' });

                // AI follow-up questions
                const questions = data.analysis?.questions || [];
                if (questions.length > 0) {
                    let qHtml = '<p class="text-sm font-semibold text-gray-900 mb-2">Ho bisogno di qualche dettaglio in più per migliorare l\'annuncio:</p><ul class="text-sm text-gray-600 space-y-1.5">';
                    questions.forEach((q, i) => {
                        qHtml += `<li class="flex items-start gap-2"><span class="text-indigo-500 font-bold">${i+1}.</span> ${q}</li>`;
                    });
                    qHtml += '</ul><p class="text-xs text-gray-400 mt-3">Rispondi qui sotto e premi invio. Oppure modifica direttamente i campi sopra.</p>';
                    this.addAiMessage(qHtml);
                }

                // Clear files
                this.previews.forEach(p => URL.revokeObjectURL(p.url));
                this.files = [];
                this.previews = [];

            } catch (e) {
                this.removeLoading(loadIdx);
                this.addAiMessage(`<p class="text-sm text-red-600">❌ ${e.message || 'Errore durante l\'analisi'}. Riprova.</p>`);
            } finally {
                this.processing = false;
                this.scrollDown();
            }
        },

        async regenerateDescriptions() {
            if (!this.draft) return;
            this.regenerating = true;
            try {
                const res = await fetch('/api/products/ai-draft', {
                    method: 'POST',
                    body: (() => {
                        const fd = new FormData();
                        fd.append('description', `${this.draft.title}, ${this.draft.category}, ${this.draft.condition}`);
                        fd.append('owner_id', this.draft.owner_id);
                        // Re-upload first image from saved path
                        const blob = new Blob(['placeholder'], {type:'text/plain'});
                        fd.append('files', blob, 'regen.txt');
                        return fd;
                    })()
                });
                // For regeneration, just re-call the generate endpoint with existing analysis
                toast('Rigenera: usa il testo modificato e premi invio di nuovo con le foto', 'info');
            } catch(e) {
                toast('Errore rigenerazione', 'error');
            } finally { this.regenerating = false; }
        },

        async createProduct() {
            if (!this.draft) return;
            this.creating = true;
            try {
                // 1. Create product
                const product = await api('/api/products/', {
                    method: 'POST',
                    body: JSON.stringify({
                        owner_id: this.draft.owner_id,
                        title: this.draft.title,
                        category: this.draft.category,
                        condition: this.draft.condition,
                        price_initial: this.draft.price,
                        defects: this.draft.defects,
                        dimensions: this.draft.dimensions,
                    })
                });

                // 2. Update descriptions
                await api(`/api/products/${product.id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({
                        desc_subito: this.draft.descriptions.subito?.description,
                        desc_ebay: this.draft.descriptions.ebay?.description,
                        desc_vinted: this.draft.descriptions.vinted?.description,
                        desc_facebook: this.draft.descriptions.facebook?.description,
                        desc_vestiaire: this.draft.descriptions.vestiaire?.description,
                    })
                });

                // 3. Link images (already saved by ai-draft)
                for (let i = 0; i < this.draft.images.length; i++) {
                    const fd = new FormData();
                    const imgPath = this.draft.images[i].path;
                    // Fetch saved image and re-upload
                    const imgRes = await fetch('/' + imgPath);
                    const blob = await imgRes.blob();
                    fd.append('file', blob, 'image_' + i + '.jpg');
                    fd.append('is_primary', i === 0 ? 'true' : 'false');
                    await fetch(`/api/products/${product.id}/upload`, { method: 'POST', body: fd });
                }

                toast('Prodotto creato con successo!');
                window.location.href = `/panel/prodotti/${product.id}`;

            } catch(e) {
                toast(e.message || 'Errore creazione', 'error');
            } finally { this.creating = false; }
        },

        now() {
            return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        },

        async refineImage() {
            if (!this.draft || !this.refineRequest.trim()) return;
            this.refining = true;
            const request = this.refineRequest.trim();
            this.addUserMessage('🎨 ' + request, 0);
            const loadIdx = this.addLoading('Modifico l\'immagine con AI...', 50);

            try {
                const fd = new FormData();
                fd.append('refinement', request);
                fd.append('original_paths', this.draft.images.map(i => i.path).join(','));
                fd.append('current_generated', this.draft.processed_path || '');
                fd.append('analysis_json', JSON.stringify({
                    object: this.draft.title,
                    category: this.draft.category,
                    materials: this.draft.materials,
                    color: this.draft.color,
                }));

                const res = await fetch('/api/products/ai-refine-image', { method: 'POST', body: fd });
                if (!res.ok) throw new Error('Errore raffinamento');
                const data = await res.json();

                this.removeLoading(loadIdx);

                if (data.processed_path) {
                    this.draft.processed_path = data.processed_path;
                    this.addAiMessage(`<p class="text-sm text-gray-900">✨ Foto aggiornata! Clicca sull'immagine per vederla a schermo intero.</p>${data.text ? '<p class="text-xs text-gray-500 mt-1">' + data.text + '</p>' : ''}`);
                } else {
                    this.addAiMessage(`<p class="text-sm text-amber-700">⚠️ Non sono riuscito a generare la modifica. ${data.text || 'Riprova con istruzioni diverse.'}</p>`);
                }

                this.refineRequest = '';
            } catch(e) {
                this.removeLoading(loadIdx);
                this.addAiMessage(`<p class="text-sm text-red-600">❌ ${e.message || 'Errore'}</p>`);
            } finally {
                this.refining = false;
                this.scrollDown();
            }
        },

        openLightbox(src) {
            this.lightboxSrc = src;
        },

        scrollDown() {
            this.$nextTick(() => {
                if (this.$refs.chatArea) this.$refs.chatArea.scrollTop = this.$refs.chatArea.scrollHeight;
            });
        },
    };
}
</script>
{% endblock %}
